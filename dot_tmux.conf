# $Id: vim-keys.conf,v 1.2 2010-09-18 09:36:15 nicm Exp $
#
# vim-keys.conf, v1.2 2010/09/12
#
# By Daniel Thau.  Public domain.
#
# This configuration file binds many vi- and vim-like bindings to the
# appropriate tmux key bindings.  Note that for many key bindings there is no
# tmux analogue.  This is intended for tmux 1.3, which handles pane selection
# differently from the previous versions

set -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix
set-option -g default-command 'fish'
set-option -g renumber-windows on
#set -g mouse on


# split windows like vim
# vim's definition of a horizontal/vertical split is reversed from tmux's
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind a last-window

set -g display-panes-time 4000

# resize panes like vim
# feel free to change the "1" to however many lines you want to resize by, only
# one at a time can be slow
bind < resize-pane -L 2
bind > resize-pane -R 2
bind - resize-pane -D 1
bind + resize-pane -U 1

# bind : to command-prompt like vim
# this is the default in tmux already
bind : command-prompt

# vi-style controls for copy mode
setw -g mode-keys vi

unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send-keys -X rectangle-toggle\; send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe "wl-copy"
bind-key -T copy-mode-vi 'r' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'H' send-keys -X start-of-line
bind-key -T copy-mode-vi 'L' send-keys -X end-of-line
bind-key ';' command-prompt

set -s escape-time 0
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

set -g focus-events on

# color
set -g status-style fg=white,bg=colour233
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour124
set -g mode-style fg=default,bg=colour240

# status style (itchyny)
set -g status on
set -g status-position top
set -g status-interval 1
set -g status-justify left
set -g window-status-format " #[fg=colour246]#I#[fg=colour244]:#P #[fg=colour248]#W "
set -g window-status-current-format "#[fg=colour234,bg=colour247] #I:#P #W "
set -g status-left-length 32
set -g status-left ''
set -g status-right-length 150
set -g status-right '#[fg=colour245] %x %T @ #H '
set -g message-style fg=white,bg=black,bold

set -g set-clipboard on
set-option -g history-limit 5000

set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key f
# Match rg --vimgrep output: file:line:col:text
set -g @fingers-pattern-0 '[^\s:]+:\d+:\d+:'

# Ctrl action: open in neovim at the exact line/col
set -g @fingers-ctrl-action 'xargs -I {} tmux send-keys "nvim +$(echo {} | cut -d: -f2) $(echo {} | cut -d: -f1)" Enter'


set -g @plugin 'laktak/extrakto'
set -g @plugin 'christoomey/vim-tmux-navigator'

# set -g @vim_navigator_mapping_left "M-h"
# set -g @vim_navigator_mapping_right "M-l"
# set -g @vim_navigator_mapping_up "M-k"
# set -g @vim_navigator_mapping_down "M-j"
# set -g @vim_navigator_mapping_prev "M-\\"
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'M-h' if-shell "$is_vim" { send-keys M-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'M-j' if-shell "$is_vim" { send-keys M-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'M-k' if-shell "$is_vim" { send-keys M-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'M-l' if-shell "$is_vim" { send-keys M-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'M-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'M-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'M-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'M-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }
run '~/.tmux/plugins/tpm/tpm'


# move around panes with hjkl, as one would in vim after pressing ctrl-w
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
